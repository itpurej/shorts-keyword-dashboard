name: Daily Keyword Collection

on:
  schedule:
    # 매일 오전 9시 KST (= UTC 00:00)
    - cron: "0 0 * * *"
  workflow_dispatch:  # 수동 실행 버튼도 활성화

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run keyword collection
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: python scripts/collect.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "chore: update keyword data $(date -u +%Y-%m-%d)"
          git push
