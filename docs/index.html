<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼츠 리빙 키워드 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #ff0000 0%, #c00000 100%);
      padding: 24px 32px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { font-size: 32px; }
    .logo-text h1 { font-size: 22px; font-weight: 700; color: #fff; }
    .logo-text p { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 2px; }
    .updated { font-size: 12px; color: rgba(255,255,255,0.7); text-align: right; }

    .controls {
      padding: 16px 32px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
    }
    .search-box {
      flex: 1; min-width: 180px; max-width: 360px;
      padding: 9px 16px; border-radius: 24px; border: 1px solid #333;
      background: #0f0f0f; color: #e8e8e8; font-size: 14px; outline: none;
    }
    .search-box:focus { border-color: #ff0000; }
    .search-box::placeholder { color: #555; }

    .sort-btn {
      padding: 7px 14px; border-radius: 20px; border: 1px solid #333;
      background: #0f0f0f; color: #888; font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .sort-btn:hover { border-color: #ff0000; color: #fff; }
    .sort-btn.active { background: #ff0000; border-color: #ff0000; color: #fff; }

    .stats-bar {
      display: flex; gap: 32px; padding: 14px 32px;
      background: #141414; border-bottom: 1px solid #2a2a2a; flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 20px; font-weight: 700; color: #ff0000; }
    .stat-label { font-size: 11px; color: #555; margin-top: 2px; }

    .table-wrap { padding: 20px 32px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    thead th {
      padding: 11px 14px; text-align: left; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.05em; color: #555;
      border-bottom: 1px solid #2a2a2a;
    }
    tbody tr { border-bottom: 1px solid #1a1a1a; transition: background 0.15s; }
    tbody tr:hover { background: #1a1a1a; }
    td { padding: 13px 14px; font-size: 14px; }

    .rank { width: 48px; font-weight: 700; color: #555; }
    .rank-1 { color: #FFD700; font-size: 18px; }
    .rank-2 { color: #C0C0C0; font-size: 16px; }
    .rank-3 { color: #CD7F32; font-size: 16px; }

    .keyword-tag {
      display: inline-block; background: #1e1e1e; border: 1px solid #333;
      border-radius: 16px; padding: 4px 12px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; color: #fff;
    }
    .keyword-tag:hover { background: #ff0000; border-color: #ff0000; }

    /* 블루오션 배지 */
    .badge-ocean {
      display: inline-block; background: #003d2b; border: 1px solid #00c47a;
      color: #00c47a; border-radius: 12px; padding: 2px 9px; font-size: 11px;
      font-weight: 700; margin-left: 6px; vertical-align: middle;
    }

    .bar-wrap { display: flex; align-items: center; gap: 8px; }
    .bar-bg { flex: 1; height: 5px; background: #2a2a2a; border-radius: 3px; overflow: hidden; min-width: 60px; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .bar-yt { background: linear-gradient(90deg, #ff0000, #ff6b6b); }
    .bar-naver { background: linear-gradient(90deg, #03c75a, #00e87a); }
    .bar-ocean { background: linear-gradient(90deg, #0080ff, #00c8ff); }
    .bar-num { font-size: 12px; color: #888; min-width: 48px; text-align: right; }

    .views { color: #888; font-size: 13px; }
    .badge { display: inline-block; background: #1a1a1a; border-radius: 10px; padding: 3px 9px; font-size: 12px; color: #777; }

    .naver-off { font-size: 11px; color: #444; }

    .date-nav { display: flex; gap: 6px; align-items: center; margin-left: auto; }
    .date-btn {
      padding: 5px 12px; border-radius: 14px; border: 1px solid #333;
      background: #0f0f0f; color: #777; font-size: 11px; cursor: pointer; transition: all 0.2s;
    }
    .date-btn:hover, .date-btn.active { border-color: #ff0000; color: #ff0000; }

    .loading { text-align: center; padding: 80px; color: #555; }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #2a2a2a; border-top-color: #ff0000;
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px; color: #444; }

    @media (max-width: 600px) {
      header, .controls, .stats-bar, .table-wrap { padding-left: 14px; padding-right: 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🛒</div>
    <div class="logo-text">
      <h1>쇼츠 리빙 키워드 대시보드</h1>
      <p>YouTube Shorts 생활용품 인기 검색어 Top 100 · 매일 오전 9시 업데이트</p>
    </div>
  </div>
  <div class="updated" id="updatedAt">데이터 로딩 중...</div>
</header>

<div class="controls">
  <input class="search-box" type="text" id="searchInput" placeholder="키워드 검색..." />
  <span style="font-size:11px;color:#444;">정렬:</span>
  <button class="sort-btn active" data-sort="total_score">종합점수</button>
  <button class="sort-btn" data-sort="blue_ocean">🌊 블루오션</button>
  <button class="sort-btn" data-sort="naver_trend">네이버 검색량</button>
  <button class="sort-btn" data-sort="avg_views">평균조회수</button>
  <button class="sort-btn" data-sort="video_count">영상수</button>
  <div class="date-nav" id="dateNav"></div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-num" id="totalKeywords">-</div><div class="stat-label">수집 키워드</div></div>
  <div class="stat"><div class="stat-num" id="topKeyword">-</div><div class="stat-label">1위 키워드</div></div>
  <div class="stat"><div class="stat-num" id="topOcean">-</div><div class="stat-label">블루오션 1위</div></div>
  <div class="stat"><div class="stat-num" id="naverStatus">-</div><div class="stat-label">네이버 데이터</div></div>
</div>

<div class="table-wrap">
  <div class="loading" id="loading"><div class="spinner"></div><div>데이터 불러오는 중...</div></div>
  <table id="mainTable" style="display:none;">
    <thead>
      <tr>
        <th>순위</th>
        <th>키워드</th>
        <th style="min-width:130px;">YouTube 점수</th>
        <th style="min-width:120px;">🌊 블루오션</th>
        <th style="min-width:120px;">네이버 검색량</th>
        <th>영상수</th>
        <th>평균조회수</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty" id="emptyMsg" style="display:none;">검색 결과가 없습니다.</div>
</div>

<script>
  let allData = [];
  let currentSort = "total_score";
  let maxYt = 1, maxOcean = 1, maxNaver = 1;
  let hasNaver = false;

  function fmt(n) {
    if (n >= 100000000) return (n/100000000).toFixed(1) + "억";
    if (n >= 10000) return (n/10000).toFixed(1) + "만";
    if (n >= 1000) return (n/1000).toFixed(1) + "천";
    return n.toLocaleString();
  }

  function rankCell(r) {
    if (r === 1) return `<span class="rank rank-1">🥇</span>`;
    if (r === 2) return `<span class="rank rank-2">🥈</span>`;
    if (r === 3) return `<span class="rank rank-3">🥉</span>`;
    return `<span class="rank">${r}</span>`;
  }

  function isBlueOcean(item) {
    // 블루오션: 영상 수 5개 이하 + 평균 조회수 상위 30%
    const threshold = allData.slice().sort((a,b) => b.avg_views - a.avg_views)[Math.floor(allData.length * 0.3)]?.avg_views || 0;
    return item.video_count <= 5 && item.avg_views >= threshold;
  }

  function render(data) {
    const tbody = document.getElementById("tableBody");
    const table = document.getElementById("mainTable");
    const empty = document.getElementById("emptyMsg");
    document.getElementById("loading").style.display = "none";

    if (!data || data.length === 0) {
      table.style.display = "none"; empty.style.display = "block"; return;
    }
    table.style.display = "table"; empty.style.display = "none";

    tbody.innerHTML = data.map(item => {
      const ocean = isBlueOcean(item);
      const oceanBadge = ocean ? `<span class="badge-ocean">블루오션</span>` : "";
      const naverCell = hasNaver
        ? `<div class="bar-wrap">
            <div class="bar-bg"><div class="bar-fill bar-naver" style="width:${(item.naver_trend/maxNaver*100).toFixed(1)}%"></div></div>
            <span class="bar-num">${item.naver_trend}</span>
           </div>`
        : `<span class="naver-off">미연동</span>`;

      return `<tr>
        <td>${rankCell(item.rank)}</td>
        <td>
          <span class="keyword-tag" onclick="searchYT('${item.keyword}')">${item.keyword}</span>
          ${oceanBadge}
        </td>
        <td>
          <div class="bar-wrap">
            <div class="bar-bg"><div class="bar-fill bar-yt" style="width:${Math.min(100,(item.yt_score/maxYt*100)).toFixed(1)}%"></div></div>
            <span class="bar-num">${fmt(Math.round(item.yt_score))}</span>
          </div>
        </td>
        <td>
          <div class="bar-wrap">
            <div class="bar-bg"><div class="bar-fill bar-ocean" style="width:${Math.min(100,(item.blue_ocean/maxOcean*100)).toFixed(1)}%"></div></div>
            <span class="bar-num">${fmt(Math.round(item.blue_ocean))}</span>
          </div>
        </td>
        <td>${naverCell}</td>
        <td><span class="badge">${item.video_count}개</span></td>
        <td class="views">${fmt(item.avg_views)}</td>
      </tr>`;
    }).join("");
  }

  function searchYT(kw) {
    window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(kw + " shorts")}&sp=EgIYAQ%253D%253D`, "_blank");
  }

  function applyFilters() {
    const q = document.getElementById("searchInput").value.trim().toLowerCase();
    let filtered = allData.filter(d => !q || d.keyword.toLowerCase().includes(q));
    filtered = [...filtered].sort((a, b) => b[currentSort] - a[currentSort]);
    filtered.forEach((item, i) => item.rank = i + 1);
    render(filtered);
  }

  async function loadData(dateStr) {
    document.getElementById("loading").style.display = "block";
    document.getElementById("mainTable").style.display = "none";
    const path = dateStr ? `data/${dateStr}.json` : "data/latest.json";
    try {
      const resp = await fetch(path + "?_=" + Date.now());
      if (!resp.ok) throw new Error();
      const json = await resp.json();

      allData = json.keywords || [];
      hasNaver = json.has_naver || false;
      maxYt = Math.max(...allData.map(d => d.yt_score), 1);
      maxOcean = Math.max(...allData.map(d => d.blue_ocean), 1);
      maxNaver = Math.max(...allData.map(d => d.naver_trend), 1);

      document.getElementById("updatedAt").textContent = "업데이트: " + new Date(json.updated_at).toLocaleString("ko-KR");
      document.getElementById("totalKeywords").textContent = allData.length + "개";
      document.getElementById("topKeyword").textContent = allData[0]?.keyword || "-";

      const oceanTop = [...allData].sort((a,b) => b.blue_ocean - a.blue_ocean)[0];
      document.getElementById("topOcean").textContent = oceanTop?.keyword || "-";
      document.getElementById("naverStatus").textContent = hasNaver ? "연동됨" : "미연동";

      applyFilters();
    } catch {
      document.getElementById("loading").innerHTML =
        `<div style="color:#444;padding:60px;text-align:center;">
          데이터 없음<br>
          <small style="font-size:12px;display:block;margin-top:8px;">
            GitHub Actions → Daily Keyword Collection → Run workflow 실행 후 확인
          </small>
        </div>`;
    }
  }

  // 이벤트
  document.getElementById("searchInput").addEventListener("input", applyFilters);
  document.querySelectorAll(".sort-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentSort = btn.dataset.sort;
      applyFilters();
    });
  });

  // 날짜 네비
  function buildDateNav() {
    const nav = document.getElementById("dateNav");
    const today = new Date();
    for (let i = 0; i < 7; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const ds = d.toISOString().slice(0, 10);
      const btn = document.createElement("button");
      btn.className = "date-btn" + (i === 0 ? " active" : "");
      btn.textContent = i === 0 ? "오늘" : ds.slice(5);
      btn.addEventListener("click", () => {
        document.querySelectorAll(".date-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        loadData(i === 0 ? null : ds);
      });
      nav.appendChild(btn);
    }
  }

  buildDateNav();
  loadData(null);
</script>
</body>
</html>
